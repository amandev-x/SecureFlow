services:
  
  # Infrastructure
  postgres:
    image: postgres:15-alpine
    container_name: secureflow-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql

    ports:
      - "6432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s 
      timeout: 5s
      retries: 5
    networks:
      - secureflow-net

  redis:
    image: redis:7-alpine
    container_name: secureflow-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli",  "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - secureflow-net


# ── Microservices ───────────────────────────────────────────────────────────

  user-service:
    build:
      context: ./services/user-services
      dockerfile: Dockerfile
    container_name: secureflow-user-service
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/userdb
      SECRET_KEY: devsecret123
      ALGORITHM: HS256
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - secureflow-net
    restart: on-failure

  product-service:
    build:
      context: ./services/product-services
      dockerfile: Dockerfile
    container_name: secureflow-product
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/productdb
      SECRET_KEY: devsecret123
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - secureflow-net
    restart: on-failure

  order-service:
    build:
      context: ./services/order-services
      dockerfile: Dockerfile
    container_name: secureflow-order
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/orderdb
      SECRET_KEY: devsecret123
      ALGORITHM: HS256
      PRODUCT_SERVICE_URL: http://product-service:8002
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      product-service:
        condition: service_started
    networks:
      - secureflow-net
    restart: on-failure

  notification-service:
    build:
      context: ./services/notification-services
      dockerfile: Dockerfile
    container_name: secureflow-notification
    environment:
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8004:8004"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - secureflow-net
    restart: on-failure

  notification-worker:
    build:
      context: ./services/notification-services
      dockerfile: Dockerfile
    container_name: secureflow-worker
    command: celery -A app.worker worker --loglevel=info
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - secureflow-net
    restart: on-failure

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: secureflow-gateway
    environment:
      SECRET_KEY: devsecret123
      USER_SERVICE_URL: http://user-service:8001
      PRODUCT_SERVICE_URL: http://product-service:8002
      ORDER_SERVICE_URL: http://order-service:8003
      NOTIFICATION_SERVICE_URL: http://notification-service:8004
    ports:
      - "8000:8000"
    depends_on:
      - user-service
      - product-service
      - order-service
      - notification-service
    networks:
      - secureflow-net
    restart: on-failure


# ── Volumes & Networks ────────────────────────────────────────────────────────

volumes:
  postgres_data:

networks:
  secureflow-net:
    driver: bridge



  