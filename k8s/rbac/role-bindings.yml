# Bind secret reader to all secrets
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: user-service-secret-reader
  namespace: secureflow
subjects:
  - kind: ServiceAccount
    name: user-service-sa
    namespace: secureflow

roleRef:
  kind: Role 
  name: secret-reader
  apiGroup: rbac.authorization.k8s.io

---

