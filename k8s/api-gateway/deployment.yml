apiVersion: apps/v1
kind: Deployment 
metadata:
  name: api-gateway-deployment
  namespace: secureflow
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      name: api-gateway
      labels:
        app: api-gateway
    spec:
      serviceAccountName: api-gateway-sa
      imagePullSecrets:
        - name: ecr-secret
      containers:
        - name: api-gateway
          image: 066606187609.dkr.ecr.ap-south-1.amazonaws.com/secureflow/api-gateway:latest
          ports:
            - containerPort: 8000
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: SECRET_KEY
            - name: USER_SERVICE_URL
              value: "http://user-service:8001"
            - name: PRODUCT_SERVICE_URL
              value: "http://product-service:8002"
            - name: ORDER_SERVICE_URL
              value: "http://order-service:8003"
            - name: NOTIFICATION_SERVICE_URL
              value: "http://notification-service:8004"
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "100m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            
