apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-gateway-policy
  namespace: secureflow
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  policyTypes:
    - Ingress 
    - Egress 

  ingress:
    - from:
        - namespaceSelector:
            kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000
  
  egress:
    - to:
        - podSelector:
            matchLabels:
                app: user-service
      ports:
        - protocol: TCP
          port: 8001

    - to:
        - podSelector:
            matchLabels:
                app: product-service
      ports:
        - protocol: TCP
          port: 8002

    - to:
        - podSelector:
            matchLabels:
                app: order-service
      ports:
        - protocol: TCP
          port: 8003

    - to:
        - podSelector:
            matchLabels:
                app: notification-service
      ports:
        - protocol: TCP
          port: 8004

    - to:
        - namespaceSelector: 
            matchLabels:
                kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53 