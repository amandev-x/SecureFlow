# Prometheus config
prometheus:
  prometheusSpec:
    # How often to scrape targets
    scrapeInterval: 15s
    evaluationInterval: 15s

    # Retention metrics for 7 days
    retention: 7d

    # Additional scrape configs for our FastAPI services
    additionalScrapeConfigs:
      - job_name: "user-service"
        static_configs:
          - targets: ["user-service.secureflow.svc.cluster.local:8001"]
        metrics_path: "/metrics"
        scrape_interval: 15s 

      - job_name: "product-service"
        static_configs:
          - targets: ["product-service.secureflow.svc.cluster.local:8002"]
        metrics_path: "/metrics"
        scrape_interval: 15s 

      - job_name: "order-service"
        static_configs:
          - targets: ["order-service.secureflow.svc.cluster.local:8003"]
        metrics_path: "/metrics"
        scrape_interval: 15s

      - job_name: "api-gateway"
        static_configs:
          - targets: ["api-gateway.secureflow.svc.cluster.local:8000"]
        metrics_path: "/metrics"
        scrape_interval: 15s

    # Resource limits for Prometheus pod
    resources:
      requests:
        memory: "200Mi"
        cpu: "200m"

      limits:
        memory: "400Mi"
        cpu: "400m"

  service:
    type: NodePort
    port: 9090
    targetPort: 9090
    nodePort: 30090


# Grafana configuration
grafana:
  adminPassword: "REMOVED_SECRET"

  service:
    type: NodePort
    port: 3000
    targetPort: 3000
    nodePort: 30030

  # Resource limits
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"

    limits:
      memory: "256Mi"
      cpu: "200m"

  # Default dashboards
  defaultDashboardsEnabled: true
  defaultDashboardsTimezone: true


# Alertmanager configuration
alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      
      limits:
        memory: "128Mi"
        cpu: "100m"

  service:
    type: NodePort
    port: 9093
    targetPort: 9093
    nodePort: 30093


# Node exporter configuration
nodeExporter:
  enabled: true   # Collects ec2 instance metrics

# Kube state metrics configuration
kubeStateMetrics:
  enabled: true   # Collects k8s cluster metrics