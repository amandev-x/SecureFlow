---

- name: Update apt cache
  apt:
    update_cache: true
    cache_valid_time: 3600


- name: Install Java
  apt:
    name:
      - fontconfig
      - openjdk-21-jre
    state: present


- name: Verify Java installation
  command: java -version
  register: java_version_out


- name: Print Java version
  debug:
    msg: "{{ java_version_out.stderr }}"

- name: Ensure keyrings directory exists
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  become: true


- name: Add Jenkins gpg key
  get_url:
    url: https://pkg.jenkins.io/debian-stable/jenkins.io-2026.key
    dest: /etc/apt/keyrings/jenkins-keyring.asc
    mode: 0644


- name: Add Jenkins repository
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian-stable binary/"
    filename: jenkins
    state: present
    update_cache: true 


- name: Install Jenkins
  apt:
    name: jenkins
    state: present


- name: Start and enable Jenkins
  service:
    name: jenkins
    state: started
    enabled: true


- name: Add jenkins user to docker group
  user:
    name: jenkins
    groups:
      - docker
    append: true


- name: Wait for jenkins to start
  wait_for:
    port: "{{ jenkins_port }}"
    delay: 10
    timeout: 60


- name: Get jenkins initial admin password
  command: cat /var/lib/jenkins/secrets/initialAdminPassword
  register: jenkins_password_out


- name: Print jenkins initial password
  debug:
    msg: "{{ jenkins_password_out.stdout }}"